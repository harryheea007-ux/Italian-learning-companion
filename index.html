<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Italian Learning Companion</title>
<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
  background:#f4f4f4;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
textarea{
  width:100%;
  height:200px;
}
button{
  padding:10px;
}
</style>
</head>
<body>

<h1>🇮🇹 Italian Learning Companion</h1>

<div class="card">
<h2>Progress</h2>
<p id="count">Words learned: 0</p>

<input id="word" placeholder="New Italian word">
<button onclick="addWord()">Add Word</button>

<ul id="words"></ul>
</div>

<div class="card">
<h2>Lesson Prompt</h2>

<textarea id="prompt">
Create an Italian lesson for me.

Goals:
- Conversation Italian
- Patente exam preparation
- Listening friendly for @Voice Reader

Include:
1. Story
2. Dialogue
3. Pronunciation
4. Listening version
5. Comprehension questions
6. Speaking practice
</textarea>

</div>

<script>
let words = JSON.parse(localStorage.getItem("words") || "[]");

function render(){
  document.getElementById("count").innerText =
    "Words learned: " + words.length;

  document.getElementById("words").innerHTML =
    words.map(w => "<li>"+w+"</li>").join("");
}

function addWord(){
  let word = document.getElementById("word").value.trim();

  if(!word) return;

  words.push(word);

  localStorage.setItem("words", JSON.stringify(words));

  document.getElementById("word").value="";

  render();
}

render();
</script>

</body>
</html>
