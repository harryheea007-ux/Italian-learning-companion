<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Tracker</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
background:#333;
color:white;
border:none;
border-radius:8px;
}

button{
padding:12px 18px;
background:#0a84ff;
color:white;
border:none;
border-radius:8px;
}

.word{
background:#333;
padding:10px;
margin-top:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:red;
}
</style>
</head>

<body>

<h1>📚 Vocabulary Tracker</h1>

<div class="card">
<h2>Add Word</h2>

<input id="italian" placeholder="Italian word">

<input id="english" placeholder="Meaning">

<button onclick="addWord()">Add</button>
</div>

<div class="card">
<h2>Progress</h2>

<p>Words Learned:
<span id="count">0</span>
</p>
</div>

<div class="card">
<h2>My Vocabulary</h2>

<div id="list"></div>
</div>

<script>

let words =
JSON.parse(localStorage.getItem("words")) || [];

function save(){
localStorage.setItem(
"words",
JSON.stringify(words)
);
render();
}

function addWord(){

let italian =
document.getElementById("italian").value;

let english =
document.getElementById("english").value;

if(!italian || !english) return;

words.push({
italian,
english
});

save();

document.getElementById("italian").value="";
document.getElementById("english").value="";
}

function removeWord(index){
words.splice(index,1);
save();
}

function render(){

document.getElementById("count").innerText =
words.length;

let html="";

words.forEach((word,index)=>{

html += `
<div class="word">
<div>
<b>${word.italian}</b><br>
${word.english}
</div>

<button class="delete"
onclick="removeWord(${index})">
Delete
</button>

</div>
`;

});

document.getElementById("list").innerHTML =
html;
}

render();

</script>

</body>
</html>
