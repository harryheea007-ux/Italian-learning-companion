<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#333;
color:white;
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
}

.word{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-top:10px;
background:#2a2a2a;
border-radius:8px;
}

.learned{
opacity:0.5;
text-decoration:line-through;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 Vocabulary V2</h1>

<div class="card">

<h2>Progress</h2>
<p>Words Learned: <span id="count">0</span> / 1000</p>

<div style="height:15px;background:#333;border-radius:10px;overflow:hidden;">
<div id="bar" style="height:100%;width:0%;background:green;"></div>
</div>

<p id="percent">0%</p>
<p>Total XP: <span id="xp">0</span></p>

</div>

<div class="card">

<h2>Search</h2>
<input id="search" oninput="render()" placeholder="Search word...">

</div>

<div class="card">

<h2>Filter</h2>
<select id="filter" onchange="render()">
<option value="all">All</option>
<option value="learned">Learned</option>
<option value="not">Not Learned</option>
</select>

</div>

<div class="card">
<h2>Words</h2>
<div id="list"></div>
</div>

</div>

<script>

// STARTER 100 WORDS (expand later to 1000)
let words = JSON.parse(localStorage.getItem("vocabV2")) || [
{it:"ciao",en:"hello",cat:"daily",learned:false},
{it:"grazie",en:"thank you",cat:"daily",learned:false},
{it:"lavoro",en:"work",cat:"work",learned:false},
{it:"camion",en:"truck",cat:"trucking",learned:false},
{it:"patente",en:"driving license",cat:"driving",learned:false},
{it:"strada",en:"road",cat:"driving",learned:false},
{it:"benzina",en:"fuel",cat:"driving",learned:false},
{it:"documento",en:"document",cat:"government",learned:false}
];

let xp = parseInt(localStorage.getItem("vocabXP")) || 0;

function save(){
localStorage.setItem("vocabV2", JSON.stringify(words));
localStorage.setItem("vocabXP", xp);
}

function toggleLearned(index){
words[index].learned = !words[index].learned;

if(words[index].learned){
xp += 5;
}

save();
render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let filtered = words.filter(w=>{

let matchSearch =
w.it.toLowerCase().includes(search) ||
w.en.toLowerCase().includes(search);

let matchFilter =
filter==="all" ||
(filter==="learned" && w.learned) ||
(filter==="not" && !w.learned);

return matchSearch && matchFilter;
});

filtered.forEach((w,i)=>{

let div = document.createElement("div");
div.className = "word";

if(w.learned) div.classList.add("learned");

div.innerHTML = `
<div>
<b>${w.it}</b> - ${w.en}<br>
<small>${w.cat}</small>
</div>

<button onclick="toggleLearned(${i})">
${w.learned ? "Undo" : "Learn"}
</button>
`;

list.appendChild(div);

});

document.getElementById("count").innerText =
words.filter(w=>w.learned).length;

let percent =
(words.filter(w=>w.learned).length / 1000) * 100;

document.getElementById("bar").style.width =
percent + "%";

document.getElementById("percent").innerText =
percent.toFixed(1) + "%";

document.getElementById("xp").innerText = xp;

save();
}

render();

</script>

</body>
</html>
