<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversation V3 Offline Tutor</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

h1,h2{
margin-top:0;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.chat{
background:#222;
padding:15px;
border-radius:10px;
min-height:250px;
max-height:450px;
overflow:auto;
}

.user{
color:#4da3ff;
margin:10px 0;
}

.ai{
color:#7CFC00;
margin:10px 0;
}

.bad{
color:#ff6666;
margin:10px 0;
}

.good{
color:#6aff6a;
margin:10px 0;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.stat{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
}

.history{
background:#222;
padding:10px;
border-radius:10px;
margin-top:10px;
max-height:200px;
overflow:auto;
}

.topic{
color:gold;
font-size:14px;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Conversation V3 Offline Tutor</h1>

<div class="card">

<h2>Scenario</h2>

<select id="scenario">

<option>Daily Life</option>
<option>Truck Driver</option>
<option>Restaurant</option>
<option>Shopping</option>
<option>Job Interview</option>
<option>Government Office</option>

</select>

</div>

<div class="card">

<h2>Progress</h2>

<div class="stats">

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Fluency<br>
<span id="fluency">0%</span>
</div>

<div class="stat">
Words Used<br>
<span id="words">0</span>
</div>

<div class="stat">
Level<br>
<span id="lvl">A1</span>
</div>

</div>

<p class="topic">
Current Topic:
<span id="topic">General</span>
</p>

</div>

<div class="card">

<h2>Conversation</h2>

<div id="chat" class="chat"></div>

<textarea
id="input"
placeholder="Write in Italian..."
></textarea>

<button onclick="sendMessage()">
Send
</button>

<button onclick="showHistory()">
Show History
</button>

<div id="history" class="history"></div>

</div>
<script>

let xp =
parseInt(localStorage.getItem("conv3xp")) || 0;

let wordsUsed =
parseInt(localStorage.getItem("conv3words")) || 0;

let history =
JSON.parse(localStorage.getItem("conv3history")) || [];

let currentTopic =
localStorage.getItem("conv3topic") || "General";

let vocab =
JSON.parse(localStorage.getItem("vocabV2")) || [];

function getLevel(){

if(xp < 200) return "A1";

if(xp < 600) return "A2";

if(xp < 1200) return "B1";

return "B2";

}

function saveData(){

localStorage.setItem(
"conv3xp",
xp
);

localStorage.setItem(
"conv3words",
wordsUsed
);

localStorage.setItem(
"conv3history",
JSON.stringify(history)
);

localStorage.setItem(
"conv3topic",
currentTopic
);

}

function countVocabUsage(text){

let count = 0;

vocab.forEach(v=>{

if(
text.toLowerCase()
.includes(v.it)
){
count++;
}

});

return count;

}

function updateStats(){

let fluency = Math.min(
100,
Math.round(
(wordsUsed * 5) +
(xp / 10)
)
);

document.getElementById(
"xp"
).innerText = xp;

document.getElementById(
"words"
).innerText = wordsUsed;

document.getElementById(
"fluency"
).innerText =
fluency + "%";

document.getElementById(
"lvl"
).innerText =
getLevel();

document.getElementById(
"topic"
).innerText =
currentTopic;

}

function addHistory(role,text){

history.push({

role:role,
text:text,
time:new Date().toLocaleString()

});

if(history.length > 200){

history.shift();

}

saveData();

}

function showHistory(){

let box =
document.getElementById(
"history"
);

box.innerHTML = "";

history.forEach(item=>{

box.innerHTML +=
`
<div>
<b>${item.role}</b>
(${item.time})
<br>
${item.text}
<hr>
</div>
`;

});

}

function loadHistoryToChat(){

let chat =
document.getElementById(
"chat"
);

chat.innerHTML = "";

history.slice(-20).forEach(item=>{

if(item.role==="You"){

chat.innerHTML +=
`<div class="user">
👤 ${item.text}
</div>`;

}else{

chat.innerHTML +=
`<div class="ai">
🤖 ${item.text}
</div>`;

}

});

chat.scrollTop =
chat.scrollHeight;

}

function detectTopic(text){

text = text.toLowerCase();

if(
text.includes("camion") ||
text.includes("truck") ||
text.includes("trasporto")
){

currentTopic =
"Truck Driver";

}

else if(
text.includes("famiglia") ||
text.includes("moglie") ||
text.includes("figlio")
){

currentTopic =
"Family";

}

else if(
text.includes("lavoro") ||
text.includes("azienda")
){

currentTopic =
"Work";

}

else if(
text.includes("italia") ||
text.includes("viaggio")
){

currentTopic =
"Travel";

}

else if(
text.includes("pizza") ||
text.includes("mangio") ||
text.includes("ristorante")
){

currentTopic =
"Food";

}

saveData();

}

updateStats();
loadHistoryToChat();
  function detectMistakes(text){

text = text.toLowerCase();

if(text.includes("io andare")){
return "❌ Better Italian: Io vado";
}

if(text.includes("io essere")){
return "❌ Better Italian: Sono";
}

if(text.includes("io have")){
return "❌ Better Italian: Ho";
}

if(text.includes("ho lavoro")){
return "❌ Better Italian: Faccio il camionista / Lavoro come camionista";
}

if(text.includes("mi piace italia")){
return "❌ Better Italian: Mi piace l'Italia";
}

return null;

}

function generateReply(text){

let t = text.toLowerCase();

if(currentTopic === "Truck Driver"){

if(
t.includes("camion") ||
t.includes("camionista")
){
return "Ottimo! Da quanto tempo fai il camionista?";
}

if(
t.includes("anno") ||
t.includes("anni")
){
return "Interessante. Che tipo di camion guidi normalmente?";
}

if(
t.includes("cibo") ||
t.includes("merce")
){
return "Trasporti solo in Italia o anche all'estero?";
}

return "Parlami di una giornata tipica come camionista.";
}

if(currentTopic === "Family"){

if(
t.includes("figlio") ||
t.includes("figli")
){
return "Quanti figli hai?";
}

if(
t.includes("moglie")
){
return "Da quanto tempo sei sposato?";
}

return "Parlami della tua famiglia.";
}

if(currentTopic === "Work"){

if(
t.includes("lavoro")
){
return "Ti piace il tuo lavoro attuale?";
}

return "Qual è la parte migliore del tuo lavoro?";
}

if(currentTopic === "Travel"){

if(
t.includes("italia")
){
return "Quale città italiana ti piace di più?";
}

return "Qual è il tuo posto preferito da visitare?";
}

if(currentTopic === "Food"){

if(
t.includes("pizza")
){
return "Qual è la tua pizza preferita?";
}

return "Quale cibo italiano ti piace di più?";
}

let level = getLevel();

let responses = {

A1:[
"Ciao! Come stai oggi?",
"Dove abiti?",
"Come ti chiami?"
],

A2:[
"Cosa hai fatto oggi?",
"Che lavoro fai?",
"Hai hobby?"
],

B1:[
"Raccontami qualcosa della tua giornata.",
"Hai mai visitato l'Italia?",
"Quali sono i tuoi obiettivi?"
],

B2:[
"Come gestisci lo stress?",
"Qual è la tua opinione sulla sicurezza stradale?",
"Descrivi una sfida che hai superato."
]

};

let list = responses[level];

return list[
Math.floor(
Math.random()*list.length
)
];

}

function sendMessage(){

let input =
document.getElementById(
"input"
);

let text =
input.value.trim();

if(!text) return;

let chat =
document.getElementById(
"chat"
);

chat.innerHTML +=
`
<div class="user">
👤 ${text}
</div>
`;

addHistory(
"You",
text
);

detectTopic(text);

let correction =
detectMistakes(text);

if(correction){

chat.innerHTML +=
`
<div class="bad">
${correction}
</div>
`;

}

else{

chat.innerHTML +=
`
<div class="good">
✅ Good Italian!
</div>
`;

}

let reply =
generateReply(text);

chat.innerHTML +=
`
<div class="ai">
🤖 ${reply}
</div>
`;

addHistory(
"Bot",
reply
);

xp += Math.max(
10,
text.length
);

wordsUsed +=
countVocabUsage(text);

saveData();

updateStats();

input.value = "";

chat.scrollTop =
chat.scrollHeight;

}

document
.getElementById("chat")
.innerHTML +=
`
<div class="ai">
🤖 Ciao! Scrivi qualcosa in italiano e iniziamo una conversazione.
</div>
`;

</script>

</body>
</html>
