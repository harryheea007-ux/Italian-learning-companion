<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#333;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
}

.chat{
background:#222;
padding:15px;
border-radius:10px;
min-height:200px;
max-height:400px;
overflow:auto;
}

.user{
color:#4da3ff;
margin:10px 0;
}

.ai{
color:#7CFC00;
margin:10px 0;
}

.bad{
color:#ff4d4d;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 Conversation V2</h1>

<div class="card">

<h2>Scenario</h2>

<select id="scenario">
<option>Restaurant</option>
<option>Shopping</option>
<option>Job Interview</option>
<option>Truck Driver</option>
<option>Government Office</option>
<option>Daily Life</option>
</select>

<select id="level">
<option value="A1">A1 Beginner</option>
<option value="A2">A2 Basic</option>
<option value="B1">B1 Intermediate</option>
<option value="B2">B2 Advanced</option>
</select>

</div>

<div class="card">

<h2>Progress</h2>

<div class="stats">

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Fluency<br>
<span id="fluency">0%</span>
</div>

<div class="stat">
Words Used<br>
<span id="words">0</span>
</div>

<div class="stat">
Level<br>
<span id="lvl">A1</span>
</div>

</div>

</div>

<div class="card">

<h2>Chat</h2>

<div id="chat" class="chat"></div>

<textarea id="input" placeholder="Type in Italian..."></textarea>

<button onclick="send()">Send</button>

</div>

</div>

<script>

let xp = parseInt(localStorage.getItem("conv2xp")) || 0;
let wordsUsed = parseInt(localStorage.getItem("conv2words")) || 0;

let vocab = JSON.parse(localStorage.getItem("vocabV2")) || [];

function getLevel(){
if(xp < 200) return "A1";
if(xp < 600) return "A2";
if(xp < 1200) return "B1";
return "B2";
}

function detectMistakes(text){

text = text.toLowerCase();

if(text.includes("io andare")){
return "❌ Correction: Io vado";
}

if(text.includes("io essere")){
return "❌ Correction: Sono";
}

if(text.includes("io have")){
return "❌ Correction: Ho";
}

return null;
}

function countVocabUsage(text){

let count = 0;

vocab.forEach(v=>{
if(text.toLowerCase().includes(v.it)){
count++;
}
});

return count;
}

function aiReply(level){

let responses = {

A1:[
"Ciao! Come stai?",
"Dove abiti?",
"Come ti chiami?"
],

A2:[
"Cosa hai fatto oggi?",
"Che lavoro fai?",
"Ti piace l'Italia?"
],

B1:[
"Raccontami della tua esperienza lavorativa.",
"Hai mai guidato un camion?",
"Come vai al lavoro ogni giorno?"
],

B2:[
"Descrivi una situazione difficile che hai affrontato.",
"Come gestisci lo stress nel lavoro?",
"Qual è la tua opinione sulla sicurezza stradale?"
]

};

let list = responses[level];

return list[Math.floor(Math.random()*list.length)];
}

function send(){

let input = document.getElementById("input");
let text = input.value.trim();

if(!text) return;

let chat = document.getElementById("chat");

chat.innerHTML += `<div class="user">👤 ${text}</div>`;

let fix = detectMistakes(text);

if(fix){
chat.innerHTML += `<div class="bad">${fix}</div>`;
}

let lvl = getLevel();
let reply = aiReply(lvl);

chat.innerHTML += `<div class="ai">🤖 ${reply}</div>`;

// scoring
xp += text.length;
wordsUsed += countVocabUsage(text);

let fluency = Math.min(100,
Math.round((wordsUsed * 5) + (xp / 10))
);

localStorage.setItem("conv2xp", xp);
localStorage.setItem("conv2words", wordsUsed);

document.getElementById("xp").innerText = xp;
document.getElementById("words").innerText = wordsUsed;
document.getElementById("fluency").innerText = fluency + "%";
document.getElementById("lvl").innerText = lvl;

input.value = "";

chat.scrollTop = chat.scrollHeight;
}

function init(){
document.getElementById("xp").innerText = xp;
document.getElementById("words").innerText = wordsUsed;
document.getElementById("lvl").innerText = getLevel();
}

init();

</script>

</body>
</html>
