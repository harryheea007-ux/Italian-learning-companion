<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff8800;
color:white;
cursor:pointer;
margin-top:10px;
}

select,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#333;
color:white;
}

.sentence{
background:#222;
padding:15px;
border-radius:10px;
font-size:18px;
text-align:center;
margin:10px 0;
}

.stat{
display:inline-block;
width:48%;
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🎤 Speaking V2</h1>

<div class="card">

<h2>Mode</h2>

<select id="mode">
<option value="shadow">Shadowing (repeat after me)</option>
<option value="free">Free speaking</option>
</select>

<button onclick="generateSentence()">
Generate Sentence
</button>

</div>

<div class="card">

<h2>Sentence</h2>

<div id="sentence" class="sentence">
Press generate to start
</div>

<button onclick="copySentence()">
Copy Sentence
</button>

</div>

<div class="card">

<h2>Self Evaluation</h2>

<p>Rate your pronunciation (1–5):</p>
<input id="rating" type="number" min="1" max="5">

<button onclick="saveSession()">
Save Speaking Session
</button>

</div>

<div class="card">

<h2>Progress</h2>

<div class="stat">
Sessions<br>
<span id="sessions">0</span>
</div>

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Confidence<br>
<span id="confidence">0%</span>
</div>

<div class="stat">
Level<br>
<span id="level">A1</span>
</div>

</div>

</div>

<script>

let sessions = parseInt(localStorage.getItem("spSessions")) || 0;
let xp = parseInt(localStorage.getItem("spXP")) || 0;
let confidence = parseInt(localStorage.getItem("spConf")) || 0;

let currentSentence = "";

const sentences = [
"Ciao, come stai oggi?",
"Dove vai in questo momento?",
"Io lavoro come autista di camion.",
"Sto imparando l'italiano ogni giorno.",
"Vorrei migliorare la mia pronuncia.",
"Puoi parlare più lentamente per favore?",
"Quanto costa questo biglietto?"
];

function generateSentence(){

currentSentence =
sentences[Math.floor(Math.random()*sentences.length)];

document.getElementById("sentence").innerText =
currentSentence;

}

function copySentence(){
navigator.clipboard.writeText(currentSentence);
alert("Sentence copied for practice!");
}

function saveSession(){

let rating = parseInt(document.getElementById("rating").value);

if(!rating || rating < 1 || rating > 5){
alert("Rate yourself 1–5");
return;
}

sessions++;

xp += rating * 10;

confidence = Math.min(100, confidence + rating * 2);

localStorage.setItem("spSessions", sessions);
localStorage.setItem("spXP", xp);
localStorage.setItem("spConf", confidence);

update();

document.getElementById("rating").value = "";

alert("Speaking session saved!");
}

function update(){

document.getElementById("sessions").innerText = sessions;
document.getElementById("xp").innerText = xp;
document.getElementById("confidence").innerText = confidence + "%";

let level = "A1";

if(xp > 200) level = "A2";
if(xp > 600) level = "B1";
if(xp > 1200) level = "B2";

document.getElementById("level").innerText = level;
}

update();

</script>

</body>
</html>
