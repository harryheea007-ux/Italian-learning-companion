<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente C Exam V1</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff8800;
color:white;
cursor:pointer;
}

.question{
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.option{
display:block;
margin:8px 0;
padding:10px;
background:#333;
border-radius:8px;
cursor:pointer;
}

.option.selected{
background:#555;
}

.stat{
display:inline-block;
width:48%;
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

.bad{
color:#ff4d4d;
}

.good{
color:#4dff88;
}
</style>

</head>

<body>

<div class="container">

<h1>🚛 Patente C Exam V1</h1>

<div class="card">

<button onclick="startTest()">Start Truck Exam</button>

<div id="quiz"></div>

<button onclick="submitTest()">Submit Exam</button>

</div>

<div class="card">

<h2>Results</h2>

<div class="stat">Score<br><span id="score">0</span></div>
<div class="stat">XP<br><span id="xp">0</span></div>
<div class="stat">Status<br><span id="status">Not Started</span></div>

</div>

<div class="card">

<h2>Review Mistakes</h2>

<div id="review"></div>

</div>

</div>

<script>

let questions = [
{q:"What is the main risk with heavy vehicles?", options:["Speed","Long braking distance","Small size","Low fuel"], answer:1},
{q:"Tachograph is used for:", options:["Speed boost","Driving time control","Fuel saving","Navigation"], answer:1},
{q:"Overloading a truck affects:", options:["Comfort","Braking and stability","Air conditioning","Radio"], answer:1},
{q:"Rest time for drivers is:", options:["Optional","Mandatory","Not needed","Only weekends"], answer:1},
{q:"Heavy vehicle braking distance is:", options:["Shorter","Longer","Same","Random"], answer:1},
{q:"Cargo must be:", options:["Loose","Properly secured","Heavy at back","Unbalanced"], answer:1},
{q:"Fatigue while driving:", options:["Improves driving","Reduces attention","No effect","Speeds up reaction"], answer:1},
{q:"Speed limits for trucks are:", options:["Higher than cars","Lower than cars","Same always","No limits"], answer:1},
{q:"Best way to prevent accidents in trucks:", options:["Speeding","Rest + safety rules","Ignoring signs","Overloading"], answer:1},
{q:"Load distribution affects:", options:["Music","Vehicle stability","Air conditioning","Fuel type"], answer:1}
];

let selected = {};
let xp = parseInt(localStorage.getItem("pcXPv1")) || 0;
let wrong = [];

function startTest(){

let quiz = document.getElementById("quiz");
quiz.innerHTML = "";
selected = {};
wrong = [];

let shuffled = questions.sort(()=>Math.random()-0.5);

shuffled.forEach(q=>{

let div = document.createElement("div");
div.className = "question";

div.innerHTML = `<p>${q.q}</p>`;

q.options.forEach((opt,idx)=>{

let btn = document.createElement("div");
btn.className = "option";
btn.innerText = opt;

btn.onclick = () => {
selected[q.q] = idx;
btn.classList.add("selected");
};

div.appendChild(btn);

});

quiz.appendChild(div);

});

document.getElementById("status").innerText = "In Progress";
}

function submitTest(){

let score = 0;

questions.forEach(q=>{

if(selected[q.q] === q.answer){
score++;
}else{
wrong.push(q);
}

});

let percent = Math.round((score/questions.length)*100);

if(percent >= 60){
xp += 40;
document.getElementById("status").innerText = "PASS ✅";
}else{
xp += 15;
document.getElementById("status").innerText = "FAIL ❌";
}

localStorage.setItem("pcXPv1", xp);

document.getElementById("score").innerText = percent + "%";
document.getElementById("xp").innerText = xp;

// review
let review = document.getElementById("review");
review.innerHTML = "";

wrong.forEach(q=>{
let div = document.createElement("div");
div.className = "bad";
div.innerHTML = `
<b>${q.q}</b><br>
Correct: ${q.options[q.answer]}
`;
review.appendChild(div);
});

}

</script>

</body>
</html>
