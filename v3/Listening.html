<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#28a745;
color:white;
cursor:pointer;
margin-top:10px;
}

select,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#333;
color:white;
}

.storyBox{
background:#222;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}

.stat{
display:inline-block;
width:48%;
background:#222;
padding:10px;
border-radius:10px;
margin-top:10px;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>🎧 Listening V2</h1>

<div class="card">

<h2>Level</h2>
<select id="level">
<option>A1</option>
<option>A2</option>
<option>B1</option>
<option>B2</option>
</select>

<button onclick="generateStory()">
Generate Story
</button>

</div>

<div class="card">

<h2>Story</h2>
<div id="story" class="storyBox">
Press "Generate Story"
</div>

<button onclick="copyStory()">
Copy for @Voice App
</button>

</div>

<div class="card">

<h2>Comprehension Check</h2>

<p>1. What is the main topic?</p>
<input id="q1">

<p>2. What happens in the story?</p>
<input id="q2">

<p>3. What did you understand?</p>
<input id="q3">

<button onclick="checkAnswers()">
Check Answers
</button>

</div>

<div class="card">

<h2>Progress</h2>

<div class="stat">
Stories<br>
<span id="stories">0</span>
</div>

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Accuracy<br>
<span id="acc">0%</span>
</div>

<div class="stat">
Level<br>
<span id="lvl">A1</span>
</div>

</div>

</div>

<script>

let stories = parseInt(localStorage.getItem("listStories")) || 0;
let xp = parseInt(localStorage.getItem("listXP")) || 0;
let correct = parseInt(localStorage.getItem("listCorrect")) || 0;
let total = parseInt(localStorage.getItem("listTotal")) || 0;

let currentStory = "";

function generateStory(){

let level = document.getElementById("level").value;

let storiesDB = {
A1:"Ciao! Marco va al lavoro. Prende il bus ogni giorno. È felice.",
A2:"Maria lavora in un supermercato. Oggi incontra un cliente difficile ma resta calma.",
B1:"Un camionista guida da Milano a Roma. La strada è lunga e deve rispettare le regole.",
B2:"Un autista professionale affronta condizioni difficili mentre trasporta merci importanti attraverso l'Italia."
};

currentStory = storiesDB[level];

document.getElementById("story").innerText = currentStory;

stories++;

localStorage.setItem("listStories", stories);

update();
}

function copyStory(){
navigator.clipboard.writeText(currentStory);
alert("Copied to clipboard for listening app!");
}

function checkAnswers(){

let q1 = document.getElementById("q1").value;
let q2 = document.getElementById("q2").value;
let q3 = document.getElementById("q3").value;

if(!q1 || !q2 || !q3){
alert("Answer all questions!");
return;
}

let score =
(q1.length + q2.length + q3.length) / 3;

xp += Math.round(score);
total++;
correct += 1;

localStorage.setItem("listXP", xp);
localStorage.setItem("listCorrect", correct);
localStorage.setItem("listTotal", total);

update();
}

function update(){

let acc = total ? Math.round((correct/total)*100) : 0;

document.getElementById("stories").innerText = stories;
document.getElementById("xp").innerText = xp;
document.getElementById("acc").innerText = acc + "%";

let level = "A1";
if(xp > 200) level = "A2";
if(xp > 600) level = "B1";
if(xp > 1200) level = "B2";

document.getElementById("lvl").innerText = level;
}

update();

</script>

</body>
</html>
