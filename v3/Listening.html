<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Listening V3</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

h1,h2,h3{
margin-top:0;
}

select,
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.stat{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎧 Listening V3</h1>

<div class="card">

<h2>Progress</h2>

<div class="stats">

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Stories<br>
<span id="stories">0</span>
</div>

<div class="stat">
Fluency<br>
<span id="fluency">0%</span>
</div>

<div class="stat">
Level<br>
<span id="lvl">A1</span>
</div>

</div>

</div>

<div class="card">

<h2>Story Builder</h2>

<label>Level</label>

<select id="level">

<option>A1</option>
<option>A2</option>
<option>B1</option>
<option>B2</option>

</select>

<label>Theme</label>

<select id="theme">

<option>Daily Life</option>
<option>Travel</option>
<option>Work</option>
<option>Truck Driving</option>
<option>Food</option>
<option>Italian Culture</option>
<option>Friends</option>
<option>Adventure</option>

</select>

<label>Length</label>

<select id="length">

<option>800 Words</option>
<option>1200 Words</option>
<option>1500 Words</option>
<option>2000 Words</option>

</select>

<button onclick="generateRequest()">
Generate Story Request
</button>

</div>

<div class="card">

<h2>Story Request</h2>

<textarea
id="storyRequest"
rows="18"
placeholder="Press Generate Story Request..."
></textarea>

<button onclick="copyRequest()">
Copy Request
</button>

</div>
<script>

let xp =
parseInt(localStorage.getItem("listenV3xp")) || 0;

let stories =
parseInt(localStorage.getItem("listenV3stories")) || 0;

function getLevel(){

if(xp < 200) return "A1";

if(xp < 600) return "A2";

if(xp < 1200) return "B1";

return "B2";

}

function updateStats(){

let fluency = Math.min(
100,
Math.round(
(stories * 10) +
(xp / 20)
)
);

document.getElementById(
"xp"
).innerText = xp;

document.getElementById(
"stories"
).innerText = stories;

document.getElementById(
"fluency"
).innerText =
fluency + "%";

document.getElementById(
"lvl"
).innerText =
getLevel();

}

function saveData(){

localStorage.setItem(
"listenV3xp",
xp
);

localStorage.setItem(
"listenV3stories",
stories
);

}

function generateRequest(){

const level =
document.getElementById(
"level"
).value;

const theme =
document.getElementById(
"theme"
).value;

const length =
document.getElementById(
"length"
).value;

const request =
`ITALIAN IMMERSION STORY REQUEST

Language: Italian

Level:
${level}

Theme:
${theme}

Length:
${length}

Requirements:

- Write entirely in Italian
- Use high-frequency Italian vocabulary
- Focus on the 1000 most important Italian words
- Include realistic dialogue
- Include descriptions and narration
- Repeat key vocabulary naturally
- Make the story immersive and easy to follow
- Use level-appropriate grammar
- Include at least 20 vocabulary items with English meanings
- Include 10 comprehension questions

Output Format:

1. Story
2. Vocabulary List
3. Comprehension Questions
`;

document.getElementById(
"storyRequest"
).value = request;

xp += 20;
stories++;

saveData();
updateStats();

}

function copyRequest(){

const text =
document.getElementById(
"storyRequest"
).value;

navigator.clipboard.writeText(text);

alert(
"Story request copied!"
);

}

updateStats();

</script>

</div>

</body>
</html>
