<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente B Exam Mode</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
}

.question{
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.option{
display:block;
margin:8px 0;
padding:10px;
background:#333;
border-radius:8px;
cursor:pointer;
}

.correct{
background:green !important;
}

.wrong{
background:red !important;
}

.stat{
display:inline-block;
width:48%;
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚗 Patente B Exam Mode</h1>

<div class="card">

<h2>Test</h2>

<button onclick="startTest()">
Start Exam
</button>

<div id="quiz"></div>

<button onclick="submitTest()">
Submit Test
</button>

</div>

<div class="card">

<h2>Results</h2>

<div class="stat">
Score<br>
<span id="score">0</span>
</div>

<div class="stat">
XP<br>
<span id="xp">0</span>
</div>

<div class="stat">
Status<br>
<span id="status">Not Started</span>
</div>

</div>

</div>

<script>

let questions = [
{
q:"What does a red traffic light mean?",
options:["Go","Stop","Slow down","Turn right"],
answer:1
},
{
q:"What should you do at a stop sign?",
options:["Speed up","Stop completely","Honk","Ignore it"],
answer:1
},
{
q:"Seatbelt is:",
options:["Optional","Mandatory","Only for driver","Not needed"],
answer:1
},
{
q:"Alcohol while driving is:",
options:["Allowed","Limited","Strictly forbidden","Recommended"],
answer:2
},
{
q:"Priority on road is given to:",
options:["Right side","Left side","Fast cars","Trucks"],
answer:0
}
];

let selected = {};
let score = 0;
let xp = parseInt(localStorage.getItem("pbExamXP")) || 0;

function startTest(){

let quiz = document.getElementById("quiz");
quiz.innerHTML = "";

selected = {};
score = 0;

questions.forEach((q,i)=>{

let div = document.createElement("div");
div.className = "question";

div.innerHTML = `<p>${q.q}</p>`;

q.options.forEach((opt,idx)=>{

let btn = document.createElement("div");
btn.className = "option";
btn.innerText = opt;

btn.onclick = () => {
selected[i] = idx;
};

div.appendChild(btn);

});

quiz.appendChild(div);

});

document.getElementById("status").innerText = "In Progress";
}

function submitTest(){

score = 0;

questions.forEach((q,i)=>{
if(selected[i] === q.answer){
score++;
}
});

let percent = Math.round((score/questions.length)*100);

if(percent >= 60){
xp += 20;
document.getElementById("status").innerText = "PASS ✅";
}else{
document.getElementById("status").innerText = "FAIL ❌";
}

localStorage.setItem("pbExamXP", xp);

document.getElementById("score").innerText = percent + "%";
document.getElementById("xp").innerText = xp;
}

</script>

</body>
</html>
