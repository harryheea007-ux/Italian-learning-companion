<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patente B Exam V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0a84ff;
color:white;
cursor:pointer;
}

.question{
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.option{
display:block;
margin:8px 0;
padding:10px;
background:#333;
border-radius:8px;
cursor:pointer;
}

.option.selected{
background:#555;
}

.stat{
display:inline-block;
width:48%;
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

.bad{
color:#ff4d4d;
}

.good{
color:#4dff88;
}
</style>

</head>

<body>

<div class="container">

<h1>🚗 Patente B Exam V2</h1>

<div class="card">

<button onclick="startTest()">Start Exam</button>

<div id="quiz"></div>

<button onclick="submitTest()">Submit Test</button>

</div>

<div class="card">

<h2>Results</h2>

<div class="stat">Score<br><span id="score">0</span></div>
<div class="stat">XP<br><span id="xp">0</span></div>
<div class="stat">Status<br><span id="status">Not Started</span></div>

</div>

<div class="card">
<h2>Review</h2>
<div id="review"></div>
</div>

</div>

<script>

let questions = [
{q:"What does a red light mean?", options:["Go","Stop","Wait","Turn"], answer:1, topic:"rules"},
{q:"Seatbelt is?", options:["Optional","Mandatory","Only driver","Not needed"], answer:1, topic:"safety"},
{q:"Alcohol limit while driving?", options:["No limit","Strictly forbidden","Depends","Only at night"], answer:1, topic:"alcohol"},
{q:"At STOP sign you must:", options:["Slow","Stop completely","Honk","Ignore"], answer:1, topic:"rules"},
{q:"Who has priority?", options:["Left","Right","Fast cars","Trucks"], answer:1, topic:"priority"},
{q:"What is a roundabout rule?", options:["Exit freely","Give way","Speed up","Stop always"], answer:1, topic:"rules"},
{q:"Mobile phone while driving?", options:["Allowed","Forbidden","Optional","Only GPS"], answer:1, topic:"safety"},
{q:"Pedestrians at crossing?", options:["Ignore","Give priority","Honk","Speed"], answer:1, topic:"rules"},
{q:"Green light means?", options:["Stop","Go","Wait","Turn only"], answer:1, topic:"rules"},
{q:"Tired driving is:", options:["Safe","Dangerous","Fast","Normal"], answer:1, topic:"safety"}
];

let selected = {};
let xp = parseInt(localStorage.getItem("pbXPv2")) || 0;
let wrongAnswers = [];

function startTest(){

let quiz = document.getElementById("quiz");
quiz.innerHTML = "";
selected = {};
wrongAnswers = [];

let shuffled = questions.sort(()=>Math.random()-0.5);

shuffled.forEach((q,i)=>{

let div = document.createElement("div");
div.className = "question";

div.innerHTML = `<p>${q.q}</p>`;

q.options.forEach((opt,idx)=>{

let btn = document.createElement("div");
btn.className = "option";
btn.innerText = opt;

btn.onclick = () => {
selected[q.q] = idx;
btn.classList.add("selected");
};

div.appendChild(btn);

});

quiz.appendChild(div);

});

document.getElementById("status").innerText = "In Progress";
}

function submitTest(){

let score = 0;

questions.forEach(q=>{

if(selected[q.q] === q.answer){
score++;
}else{
wrongAnswers.push(q);
}

});

let percent = Math.round((score/questions.length)*100);

if(percent >= 60){
xp += 30;
document.getElementById("status").innerText = "PASS ✅";
}else{
document.getElementById("status").innerText = "FAIL ❌";
xp += 10;
}

localStorage.setItem("pbXPv2", xp);

document.getElementById("score").innerText = percent + "%";
document.getElementById("xp").innerText = xp;

// review system
let review = document.getElementById("review");
review.innerHTML = "";

wrongAnswers.forEach(q=>{
let div = document.createElement("div");
div.className = "bad";
div.innerHTML = `
<b>${q.q}</b><br>
Correct answer: ${q.options[q.answer]}
`;
review.appendChild(div);
});

}

</script>

</body>
</html>
