<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CQC Professional Driver Tracker</title>

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#333;
color:white;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#9c27b0;
color:white;
border:none;
border-radius:8px;
}

.stat{
font-size:20px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🏢 CQC Professional Driver</h1>

<div class="card">

<h3>Study Session</h3>

<input
id="hours"
type="number"
placeholder="Hours studied">

<input
id="topics"
type="number"
placeholder="Professional topics completed">

<button onclick="saveSession()">
Save Session
</button>

</div>

<div class="card">

<h3>Progress</h3>

<div class="stat">
Hours:
<span id="hoursTotal">0</span>
</div>

<div class="stat">
Topics:
<span id="topicsTotal">0</span>
</div>

<div class="stat">
XP:
<span id="xp">0</span>
</div>

<div class="stat">
Employment Readiness:
<span id="readiness">0%</span>
</div>

</div>

<script>

let hours =
parseInt(localStorage.getItem("cqcHours")) || 0;

let topics =
parseInt(localStorage.getItem("cqcTopics")) || 0;

let xp =
parseInt(localStorage.getItem("cqcXP")) || 0;

function update(){

document.getElementById("hoursTotal").innerText =
hours;

document.getElementById("topicsTotal").innerText =
topics;

document.getElementById("xp").innerText =
xp;

let readiness =
Math.min(
100,
Math.round(
(hours * 2) +
(topics * 4)
)
);

document.getElementById("readiness").innerText =
readiness + "%";

}

function saveSession(){

let newHours =
parseInt(
document.getElementById("hours").value
);

let newTopics =
parseInt(
document.getElementById("topics").value
);

if(
!newHours ||
newHours < 0 ||
!newTopics ||
newTopics < 0
){
alert("Enter valid values.");
return;
}

hours += newHours;
topics += newTopics;

xp += (newHours * 10) + (newTopics * 8);

localStorage.setItem(
"cqcHours",
hours
);

localStorage.setItem(
"cqcTopics",
topics
);

localStorage.setItem(
"cqcXP",
xp
);

update();

document.getElementById("hours").value="";
document.getElementById("topics").value="";

alert("Session saved!");

}

update();

</script>

</body>
</html>
